# KoFinRe-QA Smell Taxonomy (논문 정의 기반)
# v2.0 — 10종 (Paska + IEEE 830 + ISO/IEC/IEEE 29148 + 한국어 도메인)

version: "2.0"
total_smells: 10

smells:
  - code: S1
    name_en: "Non-atomic Requirement"
    name_ko: "복합 요구사항"
    quality_attribute: "Atomicity"
    definition: "하나의 요구사항에 둘 이상의 기능 응답이 포함된 경우"
    detect_hint:
      - "의무 표현(`해야 한다 / 하여야 한다 / 할 수 있어야`) 2회 이상"
      - "복수 동사 + `및|그리고` 결합"

  - code: S2
    name_en: "Incomplete Requirement"
    name_ko: "불완전 요구사항"
    quality_attribute: "Completeness"
    definition: "시스템 응답, 행위, 대상이 불완전한 경우"
    detect_hint:
      - "조건절(`~경우`)만 있고 결과절 부재"
      - "의무 표현 직전 동사 명사형 부재"
      - "대상 보조사(`~를/을`) 부재 + 의무 표현"

  - code: S3
    name_en: "Ambiguous Term"
    name_ko: "모호어"
    quality_attribute: "Unambiguity"
    definition: "'적절히', '필요한', '관련', '실시간' 등 해석이 불명확한 표현"
    detect_hint:
      - "30+ 사전 매칭 (필요한·적절한·신속히·효율적·실시간·다양한 등)"

  - code: S4
    name_en: "Weak Obligation"
    name_ko: "약한 의무"
    quality_attribute: "Verifiability"
    definition: "'한다', '된다', '가능하다' 등 의무성이 약한 표현"
    detect_hint:
      - "평서형 종결(`한다/된다/함/됨$`) + 의무 표현(`해야 한다`) 부재"

  - code: S5
    name_en: "Missing Actor"
    name_ko: "주체 누락"
    quality_attribute: "Completeness"
    definition: "수행 주체 또는 책임 주체가 명시되지 않은 경우"
    detect_hint:
      - "주어(`X가/이/은/는`) 없이 의무문 시작"

  - code: S6
    name_en: "Missing Quantification"
    name_ko: "정량 부재"
    quality_attribute: "Testability"
    definition: "성능, 용량, 처리량, 시간, 정확도 등 측정 가능한 속성에 정량 기준이 없는 경우"
    detect_hint:
      - "성능 키워드(`성능·속도·처리량·응답시간·동시접속·TPS·용량`) + 숫자+단위 부재"

  - code: S7
    name_en: "Undefined Acronym"
    name_ko: "미정의 약어"
    quality_attribute: "Traceability"
    definition: "영문 약어 또는 도메인 약어가 정의 없이 사용된 경우"
    detect_hint:
      - "문서 내 영문 약어 추출 - 정의(괄호/콜론) - 화이트리스트"

  - code: S8
    name_en: "Coordination Ambiguity"
    name_ko: "범위 모호"
    quality_attribute: "Unambiguity"
    definition: "'및/또는', '등', '포함', '관련' 표현으로 범위가 불명확한 경우"
    detect_hint:
      - "`및/또는|등|포함|관련` 표현 + 명사구 열거"
      - "예: '인증, 권한관리 등을 지원해야 한다'"

  - code: S9
    name_en: "Passive or Agentless Expression"
    name_ko: "수동/주체 흐림"
    quality_attribute: "Clarity"
    definition: "'처리되어야 한다', '관리되어야 한다'처럼 행위 주체가 흐려지는 표현"
    detect_hint:
      - "`~되어야 한다|~지원되어야|~구현되어야` 어미 패턴"

  - code: S10
    name_en: "Unverifiable Requirement"
    name_ko: "검증 불가"
    quality_attribute: "Verifiability"
    definition: "검증 방법 또는 판정 기준이 불명확한 요구사항"
    detect_hint:
      - "정성 표현(`효율적·안정적·신뢰성 있는`) + 측정 기준 부재"
      - "`~경우`/조건만 있고 결과 측정 기준 미명시"

# 매핑 — Paska 영문 9종과의 대응
paska_mapping:
  S1: "Non-atomic requirement"
  S2: "Incomplete requirement"
  S3: "Coordination ambiguity (어휘 부분) + Not precise verb"
  S4: "(신규 — 한국어 특화)"
  S5: "Incomplete system response"
  S6: "Incomplete requirement (정량 부분)"
  S7: "(신규 — 한국 도메인 특화)"
  S8: "Coordination ambiguity (범위 부분)"
  S9: "Passive voice"
  S10: "Incorrect order requirement / Incomplete condition (포괄)"

# IEEE 830 / ISO 29148 매핑
quality_attribute_groups:
  Atomicity: [S1]
  Completeness: [S2, S5]
  Unambiguity: [S3, S8]
  Verifiability: [S4, S10]
  Testability: [S6]
  Traceability: [S7]
  Clarity: [S9]
