# KoFinRe-QA Smell Taxonomy (논문 정의 기반)
# 19종 (Paska 9 + 한국 특화 + IEEE 830 + ISO/IEC/IEEE 29148 + INCOSE + EARS + CMMI REQM/RD + NCS 5 카테고리)
# 스키마 버전은 패키지 버전(pyproject.toml / kofinre.__version__)과 동기화한다.

version: "2.9.5"
total_smells: 19

smells:
  - code: S1
    name_en: "Non-atomic Requirement"
    name_ko: "복합 요구사항"
    quality_attribute: "Atomicity / Singular"
    source_standard: "Paska, ISO 29148, CMMI RD"
    introduced_in: "v1.0"
    definition: "하나의 요구사항에 둘 이상의 기능 응답이 포함된 경우"
    detect_hint:
      - "의무 표현(`해야 한다 / 하여야 한다 / 할 수 있어야`) 2회 이상"
      - "복수 동사 + `및|그리고` 결합"

  - code: S2
    name_en: "Incomplete Requirement"
    name_ko: "불완전 요구사항"
    quality_attribute: "Completeness"
    source_standard: "한국 특화 (SI 양식)"
    introduced_in: "v2.0"
    definition: "시스템 응답, 행위, 대상이 불완전한 경우"
    detect_hint:
      - "조건절(`~경우`)만 있고 결과절 부재"
      - "의무 표현 직전 동사 명사형 부재"
      - "대상 보조사(`~를/을`) 부재 + 의무 표현"

  - code: S3
    name_en: "Ambiguous Term"
    name_ko: "모호어"
    quality_attribute: "Unambiguity"
    source_standard: "Paska, IEEE 830, INCOSE"
    introduced_in: "v1.0"
    definition: "'적절히', '필요한', '관련', '실시간' 등 해석이 불명확한 표현"
    detect_hint:
      - "30+ 사전 매칭 (필요한·적절한·신속히·효율적·실시간·다양한 등)"

  - code: S4
    name_en: "Weak Obligation"
    name_ko: "약한 의무"
    quality_attribute: "Verifiability"
    source_standard: "한국 특화 (평서형 '한다')"
    introduced_in: "v1.0"
    definition: "'한다', '된다', '가능하다' 등 의무성이 약한 표현"
    detect_hint:
      - "평서형 종결(`한다/된다/함/됨$`) + 의무 표현(`해야 한다`) 부재"

  - code: S5
    name_en: "Missing Actor"
    name_ko: "주체 누락"
    quality_attribute: "Completeness"
    source_standard: "Paska"
    introduced_in: "v1.0"
    definition: "수행 주체 또는 책임 주체가 명시되지 않은 경우"
    detect_hint:
      - "주어(`X가/이/은/는`) 없이 의무문 시작"

  - code: S6
    name_en: "Missing Quantification"
    name_ko: "정량 부재"
    quality_attribute: "Testability"
    source_standard: "Paska, ISO 29148"
    introduced_in: "v1.0"
    definition: "성능, 용량, 처리량, 시간, 정확도 등 측정 가능한 속성에 정량 기준이 없는 경우"
    detect_hint:
      - "성능 키워드(`성능·속도·처리량·응답시간·동시접속·TPS·용량`) + 숫자+단위 부재"

  - code: S7
    name_en: "Undefined Acronym"
    name_ko: "미정의 약어"
    quality_attribute: "Traceability"
    source_standard: "한국 특화 (영문 약어 빈출)"
    introduced_in: "v2.0"
    definition: "영문 약어 또는 도메인 약어가 정의 없이 사용된 경우"
    detect_hint:
      - "문서 내 영문 약어 추출 - 정의(괄호/콜론) - 화이트리스트"

  - code: S8
    name_en: "Coordination Ambiguity"
    name_ko: "범위 모호"
    quality_attribute: "Unambiguity"
    source_standard: "Paska 분리"
    introduced_in: "v2.0"
    definition: "'및/또는', '등', '포함', '관련' 표현으로 범위가 불명확한 경우"
    detect_hint:
      - "`및/또는|등|포함|관련` 표현 + 명사구 열거"
      - "예: '인증, 권한관리 등을 지원해야 한다'"

  - code: S9
    name_en: "Passive or Agentless Expression"
    name_ko: "수동/주체 흐림"
    quality_attribute: "Clarity"
    source_standard: "Paska"
    introduced_in: "v1.0"
    definition: "'처리되어야 한다', '관리되어야 한다'처럼 행위 주체가 흐려지는 표현"
    detect_hint:
      - "`~되어야 한다|~지원되어야|~구현되어야` 어미 패턴"

  - code: S10
    name_en: "Unverifiable Requirement"
    name_ko: "검증 불가"
    quality_attribute: "Verifiability"
    source_standard: "Paska, IEEE 830"
    introduced_in: "v2.0"
    definition: "검증 방법 또는 판정 기준이 불명확한 요구사항"
    detect_hint:
      - "정성 표현(`효율적·안정적·신뢰성 있는`) + 측정 기준 부재"
      - "`~경우`/조건만 있고 결과 측정 기준 미명시"

  # ===== v2.7 확장 (ISO 29148 / INCOSE / EARS) =====

  - code: S11
    name_en: "Implementation Bias"
    name_ko: "구현 편향"
    quality_attribute: "Implementation-free"
    source_standard: "ISO 29148, INCOSE"
    introduced_in: "v2.7"
    definition: "특정 기술/플랫폼/언어를 강제하는 표현 (HOW 명시)"
    detect_hint:
      - "특정 언어/프레임워크/DB 명시 + 의무 표현"
      - "예: 'Java로 구현', 'Oracle DB 사용', 'Spring 기반'"

  - code: S12
    name_en: "Negative Statement"
    name_ko: "부정문"
    quality_attribute: "Positive form"
    source_standard: "INCOSE"
    introduced_in: "v2.7"
    definition: "긍정형이 아닌 부정형으로 표현된 요구사항 (검증 곤란)"
    detect_hint:
      - "`~지 않아야 한다 / 못해야 한다 / 안 된다 / 불가하여야` 패턴"

  - code: S13
    name_en: "Speculation"
    name_ko: "추측 표현"
    quality_attribute: "Definiteness"
    source_standard: "INCOSE Speculative"
    introduced_in: "v2.7"
    definition: "확정되지 않은 추측·조건부·미래 결정 표현"
    detect_hint:
      - "`가능하다면 / 추후 결정 / 필요시 / 만약 / 경우에 따라` 패턴"

  - code: S14
    name_en: "Missing Persona / Beneficiary"
    name_ko: "수혜자 불명"
    quality_attribute: "Stakeholder clarity"
    source_standard: "EARS, IEEE 830"
    introduced_in: "v2.7"
    definition: "시스템 동작은 명시되었으나 수혜자(사용자/이해관계자)가 없는 경우"
    detect_hint:
      - "시스템 의무문 + 사용자·운영자·관리자 등 persona 부재"

  - code: S15
    name_en: "Pronoun / Reference Ambiguity"
    name_ko: "지시어 모호"
    quality_attribute: "Reference clarity"
    source_standard: "INCOSE Pronoun"
    introduced_in: "v2.7"
    definition: "'해당', '상기', '그것', '본 건' 등 명확한 선행어가 없는 지시 표현"
    detect_hint:
      - "`해당|상기|동|그것|본 건` + 명사 — 직전 선행어 없음"

  # ===== v2.8 신규 (CMMI REQM/RD + NCS 5 카테고리) =====

  - code: S16
    name_en: "Necessity Unclear"
    name_ko: "필요성 불명확"
    quality_attribute: "Necessary"
    source_standard: "CMMI REQM, ISO 29148"
    introduced_in: "v2.8"
    definition: "사업·비즈니스 정당성이 결여된 채 작성자 선호·임의·독단을 근거로 한 요구사항"
    detect_hint:
      - "`선호하는|마음에 드는|강제로|임의로 정한|독단적|개발(팀|자)이 (선호|결정)` 등 적색 신호 어휘"
      - "예: '개발팀이 선호하는 폰트를 강제로 사용해야 한다'"

  - code: S17
    name_en: "Infeasibility / Unrealistic Absolute"
    name_ko: "실현 불가"
    quality_attribute: "Feasible"
    source_standard: "CMMI RD, ISO 29148"
    introduced_in: "v2.8"
    definition: "100% 가용성, 0초 응답, 무결점 등 물리·공학적으로 실현 불가능한 절대치"
    detect_hint:
      - "`100%\\s*(가용|정확|성공|완벽|보장|만족)` / `99\\.99{3,}%` / `장애 0건` / `응답시간 0초` / `완벽한`"
      - "허용: `99.9%` 등 현실적 SLA 수치"

  - code: S18
    name_en: "Missing Traceability ID"
    name_ko: "추적 ID 부재"
    quality_attribute: "Traceable"
    source_standard: "CMMI REQM"
    introduced_in: "v2.8"
    definition: "강한 의무 표현이 있으나 고유 ID와 상위 요구/출처/근거 인용이 모두 부재"
    detect_hint:
      - "검출 조건: STRONG_OBLIGATION 존재 + REQ_ID_PATTERN 부재 + SOURCE_RATIONALE 부재"
      - "ID 패턴: `FUNC-AUTH-001`, `REQ-001`, `FR-001`, `NFR-001` 등"
      - "출처 패턴: `~에 따라`, `~에 의거`, `~기준`, `정책/규정/표준`"

  - code: S19
    name_en: "Unclassified Constraint"
    name_ko: "제약 카테고리 불명"
    quality_attribute: "Constraint classification"
    source_standard: "NCS 5 카테고리 (TECH/BIZ/COMP/OPS/SEC)"
    introduced_in: "v2.8"
    definition: "제약 시그널 어휘가 등장하나 NCS 5 카테고리(TECH/BIZ/COMP/OPS/SEC) 어느 사전에도 매칭되지 않는 경우"
    detect_hint:
      - "제약 시그널: `제약|제한|준수|한정|허용|금지`"
      - "5 카테고리 사전 미매칭 시 검출"
      - "TECH: OS·플랫폼·프레임워크·RHEL·Java·Linux"
      - "BIZ: 예산·일정·마일스톤·오픈일·한도"
      - "COMP: 개인정보·PII·GDPR·개인정보보호법·감독규정"
      - "OPS: 24시간·365일·무중단·정기점검"
      - "SEC: MFA·다중인증·암호화·AES·감사로그"

# ===== Paska 영문 9종과의 매핑 =====
paska_mapping:
  S1: "Non-atomic requirement"
  S2: "Incomplete requirement"
  S3: "Coordination ambiguity (어휘 부분) + Not precise verb"
  S4: "(신규 — 한국어 특화)"
  S5: "Incomplete system response"
  S6: "Incomplete requirement (정량 부분)"
  S7: "(신규 — 한국 도메인 특화)"
  S8: "Coordination ambiguity (범위 부분)"
  S9: "Passive voice"
  S10: "Incorrect order requirement / Incomplete condition (포괄)"
  S11: "(신규 — ISO 29148 Implementation-free)"
  S12: "(신규 — INCOSE Positive form)"
  S13: "(신규 — INCOSE Speculative)"
  S14: "(신규 — EARS Persona)"
  S15: "(신규 — INCOSE Pronoun)"
  S16: "(신규 — CMMI Necessary)"
  S17: "(신규 — CMMI Feasible)"
  S18: "(신규 — CMMI Traceable)"
  S19: "(신규 — NCS 제약 5 카테고리)"

# ===== 품질 속성 그룹 (IEEE 830 / ISO 29148 정렬) =====
quality_attribute_groups:
  Atomicity: [S1]
  Completeness: [S2, S5, S14]
  Unambiguity: [S3, S8, S15]
  Verifiability: [S4, S10]
  Testability: [S6]
  Traceability: [S7, S18]
  Clarity: [S9]
  Implementation_free: [S11]
  Positive_form: [S12]
  Definiteness: [S13]
  Necessary: [S16]
  Feasible: [S17]
  Constraint_classification: [S19]

# ===== 표준 커버리지 (v2.8 기준) =====
standards_coverage:
  IEEE_830: "8/8"
  ISO_29148: "8/9"
  INCOSE: "8/11"
  EARS: "2/5"
  CMMI: "8/9"     # Consistent(S20) 미반영
  NCS:  "5/5"     # TECH/BIZ/COMP/OPS/SEC 모두 분류 보조
  overall: "~70%"

# ===== 로드맵 =====
roadmap:
  v2.9:
    - "S20 Consistency (의미 임베딩 기반 요구사항 간 충돌 탐지) → CMMI 9/9 완전 충족"
  v3.0:
    - "S21 EARS Pattern Advisor (Ubiquitous/Event/State/Optional/Unwanted) → 전체 표준 ~80%"
